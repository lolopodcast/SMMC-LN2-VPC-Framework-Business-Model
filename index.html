m1_nav: "1. V-P-C 架構", m1_title: "價值創造的本質：V-P-C 架構",

m1_p3: "V-P-C 架構（Value-Price-Cost）是分析價值創造與分配的核心工具。消費者的最大支付意願（WTP, V）減去企業成本（C）即為經濟價值創造（V-C）。",
m1_p4: "價格（P）決定了這份價值如何在消費者剩餘（V-P）與企業利潤（P-C）之間分配。企業追求卓越獲利的途徑有二：「做得更好」（效率導向，降低成本）或「做得不同」（效能導向，提升價值）。",
m1_svg_title: "V-P-C 價值分配圖",
m1_wrapup: "Wrap-up: V-P-C 架構清晰地展示了企業競爭力的基礎：要麼透過提升消費者支付意願（創造差異化），要麼透過降低成本（提升效率），來最大化總體的經濟價值創造與企業利潤。",
m1_case_title: "微型個案：台灣早餐店的 V-P-C",
m1_case_desc: "蛋餅成本12元，售價30元，消費者支付意願50元。經濟價值創造=38元，消費者剩餘=20元，企業利潤=18元。若推出起司蛋餅提升價值至65元，成本增至16元、售價40元，則剩餘與利潤同步擴大。",
m1_terms: [

  {front:"經濟價值創造",back:"支付意願(V)減去成本(C)的總額(V-C)，代表交易中被創造出的全部價值。"}

m3_p3: "「實質選擇權」將金融選擇權概念應用於實體投資。與其一次投入，不如分階段投資，在每個關卡依據學習成果決定是否繼續。",

m4_highlights: "Keywords: 平衡計分卡 (BSC)、間接性原則 (Obliquity)、策略地圖 (Strategy Map)。",
m4_p1: "設定績效目標存在兩大根本困境：第一，直接以目標為標的可能適得其反；第二，為達成量化指標的手段可能與原始目標相矛盾。",
m4_p2: "這印證了 John Kay 的「間接性原則」：間接追求目標往往比直接追求更有效。專注於卓越產品的企業，往往比單純追求股東價值的企業更賺錢。",
m4_p3: "Kaplan 與 Norton 的平衡計分卡（BSC）整合了四個構面：財務、客戶、內部流程、學習與成長。",
m4_p4: "透過「策略地圖」，BSC 展示了這四個構面之間的因果鏈結，確保短期財務目標不會侵蝕企業的長期核心競爭力與基礎安全文化。",
m4_svg_title: "平衡計分卡四構面",
m4_wrapup: "Wrap-up: 卓越的績效不僅僅是財報上的數字。BSC 提醒管理者，唯有在學習成長與內部流程上奠定堅實基礎，才能在客戶滿意度與最終的財務績效上獲得長遠的成功。",
m4_case_title: "微型個案：Boeing 的間接性教訓",
m4_case_desc: "早期的 Boeing 專注於工程卓越，財務成果豐碩。1990年代後轉向直接追求股東價值最大化，過度壓縮成本，最終導致安全文化崩壞與 737 MAX 危機。印證了直接追求利潤的陷阱。",
m4_terms: [
  {front:"平衡計分卡",back:"整合財務、客戶、內部流程、學習成長四構面的績效管理工具。"},
  {front:"間接性原則",back:"John Kay 提出：追求目標時，間接途徑往往比直接途徑更有效。"},
  {front:"策略地圖",back:"將 BSC 四構面以因果關係串聯的視覺化工具。"}
],
m4_q: [
  {q:"平衡計分卡包含哪四個構面？",opts:["生產、行銷、財務、人資","財務、客戶、內部流程、學習與成長","成本、營收、利潤、市佔率","短期、中期、長期、永續"],ans:_A1,exp:"財務、客戶、內部流程、學習與成長。"},
  {q:"Boeing 案例最核心的策略教訓是？",opts:["財務目標應唯一焦點","直接追求股東價值可能適得其反","工程不重要","併購永遠錯誤"],ans:_A1,exp:"從專注工程轉向直接追求財務後，反而失去市場與安全。"},
  {q:"下列何者最能描述「間接性原則」？",opts:["目標越明確越好","直接追求最有效","間接追求目標有時比直接追求更有效","全都要量化"],ans:_A2,exp:"如專注於卓越產品反而能獲得更好的財務成果。"},
  {q:"策略地圖中，各構面之間的關係是？",opts:["各自獨立","由下而上的因果鏈","由上而下的命令","僅財務有因果"],ans:_A1,exp:"學習成長驅動流程改善，提升客戶滿意，最終實現財務目標。"}
],

/* Module 5 */
m5_nav: "5. 商業模式創新", m5_title: "商業模式與策略創新",
m5_overview: "深入理解商業模式畫布的九大構件，並探討企業如何透過策略創新與「共享價值」重塑市場競爭規則。",
m5_highlights: "Keywords: 商業模式畫布 (BMC)、策略創新 (Strategic Innovation)、共享價值 (Shared Value)。",
m5_p1: "商業模式包含四大要素：價值主張、價值創造與傳遞、價值獲取與分配，以及價值永續。它是一張如何經營生意的完整藍圖。",
m5_p2: "策略創新超越了單純的產品或流程創新，它關乎啟動新的商業模式並引入新的競爭規則，創造市場的非均衡狀態。",
m5_p3: "Business Model Canvas（BMC）利用九個構件將這一切視覺化。同時，市場結構的集中度也決定了企業能夠獲取並保留多少價值。",
m5_p4: "Porter 與 Kramer 提出的「共享價值」指出，企業完全可以在追求自身競爭優勢的同時，創造正面的社會與環境成果，達成雙贏。",
m5_svg_title: "商業模式畫布 (BMC)",
m5_wrapup: "Wrap-up: 未來的競爭不再僅限於產品層面，而是商業模式層級的競爭。具備永續思維並實踐共享價值的企業，將在未來的總體經濟環境中展現出最強大的韌性。",
m5_case_title: "微型個案：Unilever 永續生活計畫",
m5_case_desc: "Unilever 推出永續生活計畫，將減少環境足跡與提升社會生計結合至核心業務中。結果永續品牌的成長速度比其他品牌快 69%，成功證明了經濟與社會價值可以相互強化。",
m5_terms: [
  {front:"商業模式畫布",back:"九構件視覺化工具，系統化描述企業如何創造、傳遞與獲取價值。"},
  {front:"共享價值",back:"在提升企業競爭力的同時改善社會條件，擴大價值的總量。"},
  {front:"策略創新",back:"建立全新的商業模式並引入新的競爭規則。"}
],
m5_q: [
  {q:"商業模式的四大要素不包含下列何者？",opts:["價值主張","價值創造與傳遞","價值獲取與分配","價值定價策略"],ans:_A3,exp:"定價是價值獲取的一部分，非獨立四大要素。"},
  {q:"在 BMC 中，「關鍵夥伴」屬於哪個價值面向？",opts:["價值主張","價值創造","價值獲取","價值傳遞"],ans:_A1,exp:"關鍵夥伴、活動、資源構成左半部的「價值創造」。"},
  {q:"Porter 的「共享價值」與傳統 CSR 的關鍵差異是？",opts:["不關心社會","重新分配既有價值","擴大經濟與社會價值的總量","僅適用大型企業"],ans:_A2,exp:"共享價值是透過商業創新擴大整體價值總量，而非單純的重新分配。"},
  {q:"策略創新與產品創新的關鍵差異是？",opts:["只關注技術","建立新的商業模式與競爭規則","不需要創新","僅限新創"],ans:_A1,exp:"策略創新涉及改變整個市場的競爭規則。"}
],

m1_nav:"1. V-P-C Framework", m1_title:"The Nature of Value Creation: V-P-C",
m1_overview: "Exploring the core proposition of strategy—how firms create value through production and commerce, and distribute it via the V-P-C framework.",
m1_highlights: "Keywords: Consumer Surplus, Economic Value Created, Production & Commerce.",
m1_p1: "The essence of strategy is the quest for value. Every enterprise has a unique mission, yet beneath these lies the desire to create value.",
m1_p2: "Robert M. Grant notes: 'Value can be created in two ways: by production and by commerce.'",
m1_p3: "The V-P-C framework (Value-Price-Cost) is the core tool. Consumer's maximum willingness-to-pay (WTP, V) minus firm cost (C) equals economic value created (V-C).",
m1_p4: "Price (P) determines how this value is split. Firms pursue profitability by 'doing better' (efficiency) or 'doing different' (effectiveness).",
m1_svg_title: "V-P-C Value Distribution",
m1_wrapup: "Wrap-up: V-P-C clearly shows competitive foundations: maximize total economic value by raising WTP or lowering cost.",
m1_case_title: "Micro Case: Taiwanese Breakfast Shop's V-P-C",
m1_case_desc: "Cost=NT$12, Price=NT$30, WTP=NT$50. Economic value created=38. Consumer surplus=20. Firm profit=18. Introducing a cheese crepe raises value to 65, expanding both surplus and profit.",
m1_terms: [
  {front:"V-P-C Framework",back:"Analyzes how economic value is created and distributed via WTP(V), Price(P), Cost(C)."},
  {front:"Consumer Surplus",back:"Difference between WTP (V) and actual price paid (P)."},
  {front:"Economic Value Created",back:"Total value created in a transaction (V-C)."}
],
m1_q: [
  {q:"How is Economic Value Created calculated?",opts:["P - C","V - P","V - C","V - P - C"],ans:_A2,exp:"Value Created = V (WTP) - C (Cost)."},
  {q:"Consumer surplus refers to?",opts:["V - C","P - C","V - P","V + P"],ans:_A2,exp:"Consumer surplus = V - P."},
  {q:"Value is created through which two methods?",opts:["Production & consumption","Production & commerce","Pricing & promotion","R&D & marketing"],ans:_A1,exp:"'Production' and 'Commerce'."},
  {q:"'Doing better vs. doing different' corresponds to?",opts:["Efficiency vs. effectiveness","Cost vs. quality","Short vs. long term","Internal vs. external"],ans:_A0,exp:"Doing better = efficiency; Doing different = effectiveness."}
],

m2_nav: "2. Performance", m2_title: "Profit Measurement & Diagnosis",
m2_overview: "Moving from accounting profit to economic profit, diagnosing performance via the DuPont identity.",
m2_highlights: "Keywords: EVA, WACC, DuPont Identity, ROCE.",
m2_p1: "Accounting profit conflates normal return to capital with true economic profit. Maximizing it may destroy shareholder value.",
m2_p2: "'EVA = NOPAT - (Capital Employed × WACC).'",
m2_p3: "EVA sets a strict performance discipline, forcing firms to face the opportunity cost of all capital.",
m2_p4: "DuPont identity decomposes return on capital into margin and turnover, allowing precise diagnosis of profitability issues.",
m2_svg_title: "EVA Framework",
m2_wrapup: "Wrap-up: Proper measurement is the starting point. EVA and DuPont strip away accounting illusions, focusing on true value-creating operations.",
m2_case_title: "Micro Case: Diageo's EVA Revolution",
m2_case_desc: "Diageo found premium aged whiskies tied up massive capital. Deducting capital costs revealed lower economic profit than vodka, prompting resource reallocation.",
m2_terms: [
  {front:"EVA",back:"Economic Value Added: NOPAT minus cost of capital."},
  {front:"DuPont Identity",back:"Decomposes ROE into ROS × Asset Turnover × Leverage."},
  {front:"ROCE",back:"Return on Capital Employed: efficiency of generating profit from invested capital."}
],
m2_q: [
  {q:"EVA formula?",opts:["Revenue - Costs","NOPAT - Cost of Capital","Net Income - Taxes","EBITDA - Depreciation"],ans:_A1,exp:"EVA = NOPAT - (Capital × WACC)."},
  {q:"DuPont identity decomposes ROE into?",opts:["Growth × Margin","ROS × Turnover × Leverage","ROCE × WACC","Gross × Net margin"],ans:_A1,exp:"ROE = Profit Margin × Asset Turnover × Financial Leverage."},
  {q:"Diageo's finding after EVA?",opts:["Whisky most profitable","Vodka's economic profit exceeded aged whisky","All equal","Food division best"],ans:_A1,exp:"Aged spirits tied up massive capital."},
  {q:"Difference between accounting and economic profit?",opts:["Time period","Deduction of capital opportunity cost","Revenue inclusion","Currency"],ans:_A1,exp:"Economic profit deducts the opportunity cost of all capital."}
],

m3_nav: "3. Enterprise Value", m3_title: "Enterprise Value & Real Options",
m3_overview: "Estimating value via DCF/WACC and introducing 'Real Options' for decision-making under high uncertainty.",
m3_highlights: "Keywords: NPV, Real Options, WACC, Intangibles.",
m3_p1: "Enterprise value equals the NPV of future free cash flows discounted at WACC. Drivers include ROCE and growth.",
m3_p2: "However, standard NPV assumes irreversible investments. In an uncertain world, flexibility is valuable.",
m3_p3: "Real options extend financial options to real investments. Phasing projects provides options to continue or abandon.",
m3_p4: "Today, intangible assets (tech, platforms) contain massive 'growth option' value.",
m3_svg_title: "Real Options Decision Tree",
m3_wrapup: "Wrap-up: Valuation isn't just static DCF. Real options thinking helps firms capture huge potential upsides with limited downside risk in uncertain environments.",
m3_case_title: "Micro Case: Shell's Hydrogen Options",
m3_case_desc: "Shell's early R&D in hydrogen acted as a 'call option'. If tech matures, they exercise it for large-scale deployment.",
m3_terms: [
  {front:"NPV",back:"Sum of future cash flows discounted to present."},
  {front:"Real Options",back:"Right but not obligation to undertake an investment, creating flexibility."},
  {front:"WACC",back:"Weighted Average Cost of Capital."}
],
m3_q: [
  {q:"DCF calculation for enterprise value?",opts:["Revenue × Margin","NPV of future FCFs discounted at WACC","Assets - Liabilities","Price × Shares"],ans:_A1,exp:"Value = Sum of discounted FCFs."},
  {q:"Core concept of real options?",opts:["Must invest immediately","Retaining flexibility is valuable","Only for large firms","Unrelated to finance"],ans:_A1,exp:"Flexibility of 'can but need not'."},
  {q:"How does uncertainty affect real option value?",opts:["Lowers value","Increases value","Unrelated","Only low uncertainty works"],ans:_A1,exp:"Greater uncertainty increases the value of waiting/flexibility."},
  {q:"Shell's hydrogen investment logic?",opts:["Short-term returns","Growth option for future commercialization","Already profitable","Boost stock price"],ans:_A1,exp:"A small R&D bet converts to large deployment if conditions mature."}
],

m4_case_desc: "Early Boeing focused on engineering excellence and achieved financial success indirectly. Later management directly pursued shareholder value, resulting in the 737 MAX crisis.",

],

  {q:"Boeing's strategic lesson?",opts:["Financials should be sole focus","Direct pursuit of shareholder value can backfire","Engineering doesn't matter","Mergers always wrong"],ans:_A1,exp:"Directly pursuing financials destroyed engineering culture and safety."},
  {q:"Which describes 'Obliquity'?",opts:["Specific goals are better","Direct pursuit is best","Indirect pursuit can be more effective","Quantify everything"],ans:_A2,exp:"Focusing on excellent products yields better financial results indirectly."},

const FlipCardBox = ({ cards, t, moduleId, onCardViewed }) => {
  const [page, setPage] = useState(0);
  const [flipped, setFlipped] = useState({});
  const pageSize = 2;
  const currentCards = cards.slice(page * pageSize, page * pageSize + pageSize);
  
  const handleFlip = (i) => {
    setFlipped(f => ({ ...f, [i]: !f[i] }));
    onCardViewed(moduleId, page * pageSize + i);
  };
  
  const handleNext = () => {
    setFlipped({});
    if ((page + 1) * pageSize >= cards.length) {
      setPage(0); // Retry
    } else {
      setPage(p => p + 1);
    }
  };

  return (
    <div className="mt-8 no-select">
      <div className="flex justify-between items-center mb-4">
        <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500">{t.key_terms}</h3>
        <span className="text-xs font-bold bg-[#D8C3A5] text-[#004030] px-2 py-1 rounded">
          {page * pageSize + 1}-{Math.min((page + 1) * pageSize, cards.length)} / {cards.length}
        </span>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {currentCards.map((c, idx) => {
          const isF = flipped[idx];
          return (
            <div key={idx} className="perspective cursor-pointer h-40" onClick={() => handleFlip(idx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${isF ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{c.front}</p>
                  <p className="text-xs text-slate-400 mt-3">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center shadow-md">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{c.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="mt-4 flex justify-end">
        <button onClick={handleNext} className="px-5 py-2 border-2 border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] rounded-lg font-bold hover:bg-[#004030] hover:text-white dark:hover:bg-[#D8C3A5] dark:hover:text-[#004030] transition-colors text-sm">
          {((page + 1) * pageSize >= cards.length) ? t.retry : t.next_batch}
        </button>
      </div>
    </div>
  );
};

const QuizBox = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [page, setPage] = useState(0);
  const [selected, setSelected] = useState({});
  const pageSize = 2;
  const currentQs = questions.slice(page * pageSize, page * pageSize + pageSize);
  
  // Scramble options once per mount
  const scrambledMaps = useMemo(() => {
    return questions.map(q => [...Array(q.opts.length).keys()].sort(() => Math.random() - 0.5));
  }, [questions]);

  const handleSelect = (qIdx, optIdx) => {
    if (selected[qIdx] !== undefined) return; // Prevent change after answering
    const isCorrect = optIdx === _d(questions[qIdx].ans);
    setSelected(s => ({ ...s, [qIdx]: { optIdx, isCorrect } }));
    onQuizSubmit(moduleId, qIdx, isCorrect);
  };

  const handleNext = () => {
    if ((page + 1) * pageSize >= questions.length) {
      setPage(0); setSelected({});
    } else {
      setPage(p => p + 1);
    }
  };

  return (
    <div className="mt-10 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 no-select">
      <div className="flex justify-between items-center mb-6">
        <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5]">{t.quiz_title}</h3>
        <span className="text-xs font-bold text-slate-500">{page * pageSize + 1}-{Math.min((page + 1) * pageSize, questions.length)} / {questions.length}</span>
      </div>
      <div className="space-y-6">
        {currentQs.map((q, idx) => {
          const globalIdx = page * pageSize + idx;
          const sMap = scrambledMaps[globalIdx];
          const answered = selected[globalIdx];
          return (
            <div key={globalIdx}>
              <p className="font-bold mb-3 text-sm sm:text-base">{globalIdx + 1}. {q.q}</p>
              <div className="grid sm:grid-cols-2 gap-2">
                {sMap.map((origIdx, displayIdx) => {
                  const opt = q.opts[origIdx];
                  const isCorrectAns = origIdx === _d(q.ans);
                  let btnClass = "text-left px-4 py-3 rounded-lg border transition-all text-sm ";
                  if (!answered) {
                    btnClass += "border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5]";
                  } else {
                    if (isCorrectAns) btnClass += "bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-400";
                    else if (answered.optIdx === origIdx) btnClass += "bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400";
                    else btnClass += "opacity-50 border-slate-200 dark:border-slate-700";
                  }
                  return (
                    <button key={displayIdx} disabled={!!answered} onClick={() => handleSelect(globalIdx, origIdx)} className={btnClass}>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {answered && (
                <div className={`mt-3 p-3 rounded-lg text-sm border ${answered.isCorrect ? 'bg-green-50 border-green-200 text-green-800 dark:bg-green-900/20 dark:border-green-800/50 dark:text-green-300' : 'bg-red-50 border-red-200 text-red-800 dark:bg-red-900/20 dark:border-red-800/50 dark:text-red-300'}`}>
                  <span className="font-bold">{answered.isCorrect ? `✓ ${t.correct} - Excellent!` : `✗ ${t.incorrect} - Let's review:`} </span>
                  <span dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(q.exp) }} />
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="mt-6 border-t border-slate-200 dark:border-slate-700 pt-4 flex justify-end">
        <button onClick={handleNext} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg font-bold shadow-md hover:bg-[#002b20] transition-colors text-sm">
          {((page + 1) * pageSize >= questions.length) ? t.retry : t.next_batch}
        </button>
      </div>
    </div>
  );
};

const BMCGame = ({ lang }) => {
  const blocks = [
    { id: 'kp', name: lang==='zh'?'關鍵夥伴':'Key Partners' },
    { id: 'ka', name: lang==='zh'?'關鍵活動':'Key Activities' },
    { id: 'kr', name: lang==='zh'?'關鍵資源':'Key Resources' },
    { id: 'vp', name: lang==='zh'?'價值主張':'Value Proposition' },
    { id: 'cr', name: lang==='zh'?'顧客關係':'Customer Relationships' },
    { id: 'ch', name: lang==='zh'?'通路':'Channels' },
    { id: 'cs', name: lang==='zh'?'目標客層':'Customer Segments' },
    { id: 'cst', name: lang==='zh'?'成本結構':'Cost Structure' },
    { id: 'rs', name: lang==='zh'?'營收流':'Revenue Streams' }
  ];
  
  const initialItems = [
    { id: 'i1', text: lang==='zh'?'大量製造':'Mass Manufacturing', target: 'ka' },
    { id: 'i2', text: lang==='zh'?'訂閱費用':'Subscription Fees', target: 'rs' },
    { id: 'i3', text: lang==='zh'?'低價但設計精良':'Affordable Great Design', target: 'vp' },
    { id: 'i4', text: lang==='zh'?'全球供應商網路':'Global Supplier Network', target: 'kp' },
    { id: 'i5', text: lang==='zh'?'小資族/學生':'Students & Young Adults', target: 'cs' }
  ];

  const [items, setItems] = useState(initialItems);
  const [placed, setPlaced] = useState({}); // { blockId: itemId }
  const [selectedItem, setSelectedItem] = useState(null);
  const [success, setSuccess] = useState(false);

  const handleBlockClick = (blockId) => {
    if (!selectedItem) return;
    const item = items.find(i => i.id === selectedItem);
    if (item.target === blockId) {
      setPlaced(p => ({ ...p, [blockId]: item }));
      setItems(items.filter(i => i.id !== selectedItem));
      setSelectedItem(null);
      if (Object.keys(placed).length + 1 === initialItems.length) setSuccess(true);
    } else {
      // Wrong guess
      alert(lang==='zh'?'❌ 放置錯誤，請再試一次！':'❌ Incorrect placement. Try again!');
      setSelectedItem(null);
    }
  };

  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700 no-select">
      <div className="flex justify-between items-center mb-4">
        <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5]">
          {lang==='zh'?'BMC 匹配小遊戲':'BMC Match Game'}
        </h4>
        <button onClick={() => {setItems(initialItems); setPlaced({}); setSuccess(false);}} className="text-xs text-slate-500 underline">Reset</button>
      </div>
      
      {success && <div className="mb-4 p-3 bg-emerald-100 text-emerald-800 rounded-lg text-sm font-bold text-center">🎉 {lang==='zh'?'恭喜完成！':'Congratulations!'}</div>}

      {/* Item Pool */}
      <div className="mb-6">
        <p className="text-xs text-slate-500 mb-2">{lang==='zh'?'1. 點擊下方項目選取':'1. Tap an item below to select it'}</p>
        <div className="flex flex-wrap gap-2">
          {items.map(item => (
            <button key={item.id} onClick={() => setSelectedItem(item.id)} 
              className={`px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${selectedItem === item.id ? 'bg-[#004030] text-white dark:bg-[#D8C3A5] dark:text-[#004030]' : 'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600'}`}>
              {item.text}
            </button>
          ))}
          {items.length === 0 && <span className="text-xs text-slate-400 italic">All items placed.</span>}
        </div>
      </div>

      {/* Canvas Board */}
      <p className="text-xs text-slate-500 mb-2">{lang==='zh'?'2. 點擊畫布上對應的區塊放入':'2. Tap the correct canvas block to place it'}</p>
      <div className="grid grid-cols-5 gap-1 sm:gap-2 text-[10px] sm:text-xs">
        <div className="col-span-1 row-span-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('kp')}>
          <div className="font-bold text-slate-400">{blocks[0].name}</div>
          {placed['kp'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['kp'].text}</div>}
        </div>
        <div className="col-span-1 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('ka')}>

          <div className="font-bold text-[#004030] dark:text-[#D8C3A5]">{blocks[3].name}</div>

          <div className="font-bold text-slate-400">{blocks[4].name}</div>
          {placed['cr'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['cr'].text}</div>}
        </div>
        <div className="col-span-1 row-span-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('cs')}>
          <div className="font-bold text-slate-400">{blocks[6].name}</div>
          {placed['cs'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['cs'].text}</div>}
        </div>
        <div className="col-span-1 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('kr')}>
          <div className="font-bold text-slate-400">{blocks[2].name}</div>
          {placed['kr'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['kr'].text}</div>}
        </div>
        <div className="col-span-1 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('ch')}>
          <div className="font-bold text-slate-400">{blocks[5].name}</div>
          {placed['ch'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['ch'].text}</div>}
        </div>
        <div className="col-span-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('cst')}>
          <div className="font-bold text-slate-400">{blocks[7].name}</div>
          {placed['cst'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['cst'].text}</div>}
        </div>
        <div className="col-span-3 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded p-1 sm:p-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50" onClick={()=>handleBlockClick('rs')}>
          <div className="font-bold text-slate-400">{blocks[8].name}</div>
          {placed['rs'] && <div className="mt-2 bg-[#004030] text-white p-1 rounded text-[10px]">{placed['rs'].text}</div>}
        </div>
      </div>
    </div>
  );
};

/* ── Custom Alert Modal ── */
const AlertModal = ({ message, onClose }) => (
  <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div className="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 border-t-4 border-[#D8C3A5]">
      <h3 className="font-serif font-bold text-lg mb-4 text-[#004030] dark:text-[#D8C3A5]">Notice</h3>
      <p className="text-sm mb-6 text-slate-700 dark:text-slate-300">{message}</p>
      <div className="flex justify-end">
        <button onClick={onClose} className="px-4 py-2 bg-[#004030] text-white rounded font-bold hover:bg-[#002b20]">OK</button>
      </div>
    </div>
  </div>
);

/* ── App Component ── */
function App() {
  const LS_KEY = 'VPC_SPA_analytics_0412'; 
  const LS_STU = 'VPC_SPA_student_0412';
  
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };
  
  // Default to Dark Mode as per instruction
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(true);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [alertMsg, setAlertMsg] = useState('');
  
  const [studentInfo, setStudentInfo] = useState(() => loadLS(LS_STU, {group:'',dept:'',id:'',nameEn:'',nameZh:''}));
  const [analytics, setAnalytics] = useState(() => loadLS(LS_KEY, {
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0), wrongTopics: {},
    cardsViewedSets: Array(TOTAL).fill().map(()=>[]) // Keep track of read card indices per module
  }));

  const contentRef = useRef(null);
  const menuRef = useRef(null);
  const t = dict[lang];

  /* Security & Defenses */
  useEffect(() => {
    // 1. Domain Lock
    const allowed = ['lolopodcast.github.io', 'localhost', '127.0.0.1', '']; 
    if (!allowed.includes(window.location.hostname) && window.location.hostname !== '') {
       window.location.href = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
    }

    // 2. Keydown Blocker
    const handleKeyDown = (e) => {
      // Exemption: Ctrl+P, Ctrl+S
      if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'P' || e.key === 'S')) return;
      
      // Block F12, Ctrl+U, Ctrl+Shift+I/J/C
      if (
        e.key === 'F12' ||
        (e.ctrlKey && (e.key === 'u' || e.key === 'U')) ||
        (e.ctrlKey && e.shiftKey && ['I','J','C','i','j','c'].includes(e.key))
      ) {
        e.preventDefault();
        setAlertMsg("Intellectual Property of Prof. Shihmin Lo");
      }
    };

    // 3. Smart Context Menu Blocker
    const handleContext = (e) => {
      // Allow if text is selected
      if (window.getSelection().toString().length > 0) return;
      
      e.preventDefault();
      setAlertMsg("Intellectual Property of Prof. Shihmin Lo");
    };

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('contextmenu', handleContext);
    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('contextmenu', handleContext);
    };
  }, []);

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { window.scrollTo({top:0, behavior:'smooth'}); if(window.speechSynthesis) window.speechSynthesis.cancel(); setTtsState('idle'); }, [module]);
  
  // Timer analytics
  useEffect(() => {
    const timer = setInterval(() => {
      setAnalytics(a => { const nt = [...a.time]; nt[module]++; return { ...a, time: nt }; });
    }, 1000);
    return () => clearInterval(timer);
  }, [module]);

  useEffect(() => {
    if (!menuOpen) return;
    const handler = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);

  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(analytics)); } catch {} }, [analytics]);
  useEffect(() => { try { localStorage.setItem(LS_STU, JSON.stringify(studentInfo)); } catch {} }, [studentInfo]);

  const handleClickAnalytics = () => { setAnalytics(a => { const nc = [...a.clicks]; nc[module]++; return { ...a, clicks: nc }; }); };
  
  const handleQuizSubmit = (mid, qIdx, isCorrect) => {
    setAnalytics(a => {
      const qc = [...a.quizCorrect], qt = [...a.quizTotal];
      qt[mid]++;
      if (isCorrect) qc[mid]++;
      // Tracking wrongs logic simplified for real-time
      return { ...a, quizCorrect: qc, quizTotal: qt };
    });
  };

  const handleCardViewed = (mid, cardIdx) => {
    setAnalytics(a => {
      const newSets = [...a.cardsViewedSets];
      if (!newSets[mid].includes(cardIdx)) newSets[mid] = [...newSets[mid], cardIdx];
      return { ...a, cardsViewedSets: newSets };
    });
  };

  const handleClearHistory = () => {
    if (window.confirm(t.analytics_wp_clear_confirm)) {
      localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_STU);
      setAnalytics({
        time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
        quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0), wrongTopics: {},
        cardsViewedSets: Array(TOTAL).fill().map(()=>[])
      });
      setStudentInfo({group:'',dept:'',id:'',nameEn:'',nameZh:''});
    }
  };

  const mKeys = ['m1','m2','m3','m4','m5'];
  const modulesList = [
    { id: 0, icon: mIcons[0], title: t.m0_nav },
    { id: 1, icon: mIcons[1], title: t.m1_nav },
    { id: 2, icon: mIcons[2], title: t.m2_nav },
    { id: 3, icon: mIcons[3], title: t.m3_nav },
    { id: 4, icon: mIcons[4], title: t.m4_nav },
    { id: 5, icon: mIcons[5], title: t.m5_nav },
    { id: 6, icon: mIcons[6], title: t.m6_nav },
    { id: 7, icon: mIcons[7], title: t.mlab_nav },
    { id: 8, icon: mIcons[8], title: t.analytics_title }
  ];

  /* TTS Engine */
  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      
      const sanitize = (str) => str ? str.replace(/<[^>]*>?/gm, '') : '';
      
      if (module === 0) {
        texts = [t.m0_title, t.m0_overview, t.m0_highlights, t.m0_p1, t.m0_p2, t.m0_p3, t.m0_wrapup];
      } else if (module >= 1 && module <= N) {
        const mk = mKeys[module-1];
        texts = [t[`${mk}_title`], t[`${mk}_overview`], t[`${mk}_highlights`], t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`], t[`${mk}_p4`], t[`${mk}_case_title`], t[`${mk}_case_desc`], t[`${mk}_wrapup`]];
      } else {
        texts = [modulesList[module].title];
      }
      
      const text = texts.map(sanitize).filter(Boolean).join(sep);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Yating')) || voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
        if (v) utterance.voice = v; utterance.lang = 'zh-TW';
      } else {
        const v = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
        if (v) utterance.voice = v; utterance.lang = 'en-GB';
      }
      utterance.onend = () => setTtsState('idle'); utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance); setTtsState('playing');
    }
  };

  const handleExportCSV = () => {
    const BOM = '\uFEFF';
    const navLabels = modulesList.map(m=>m.title);
    const rows = [
      [t.analytics_group, t.analytics_dept, t.analytics_id, t.analytics_name_en, t.analytics_name_zh],
      [studentInfo.group, studentInfo.dept, studentInfo.id, studentInfo.nameEn, studentInfo.nameZh],
      [],
      [t.analytics_module, t.analytics_time, t.analytics_clicks, t.analytics_card_usage, t.analytics_acc]
    ];
    
    for(let i=0; i<TOTAL; i++) {
      if(i === 6 || i === 7) continue; // Skip resources and lab in detailed score if not needed
      const isContent = i>=1 && i<=N;
      const cardTotal = isContent ? (t[`${mKeys[i-1]}_terms`]?.length || 0) : 0;
      const cardRead = analytics.cardsViewedSets[i]?.length || 0;
      const cardRate = cardTotal > 0 ? Math.round((cardRead/cardTotal)*100)+'%' : '-';
      
      const acc = analytics.quizTotal[i] > 0 ? Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%' : t.analytics_no_data;
      
      rows.push([
        navLabels[i] || `M${i}`, 
        analytics.time[i] + t.analytics_sec, 
        analytics.clicks[i] + t.analytics_times, 
        cardRate,
        acc
      ]);
    }

    const csv = BOM + rows.map(r => r.join(',')).join('\n');
    const now = new Date();
    const ds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    
    // Strict Filename: (網頁品牌+)主標題*+(組別+學號+)姓名*+匯出日期*
    const safeTitle = dict.zh.title.replace(/[^\w\s\u4e00-\u9fa5]/gi, '');
    const fn = `${dict.zh.brand}_${safeTitle}_${studentInfo.group}_${studentInfo.id}_${studentInfo.nameZh}_${ds}.csv`;
    
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = fn; a.click();
  };

  /* ── Content Renderers ── */
  const renderNavBottom = () => (
    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700 no-select">
      <button onClick={() => setModule(Math.max(0, module-1))} disabled={module===0} className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider">← {t.nav_prev}</button>
      <button onClick={() => setModule(Math.min(TOTAL-1, module+1))} disabled={module===TOTAL-1} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider shadow-md">{t.nav_next} <IconArrowRight size={16} className="ml-2"/></button>
    </div>
  );

  const renderModule = (mk, midx) => {
    return (
      <div className="space-y-6 text-base leading-relaxed animate-fade-in core-content">
        <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3 border-b-2 border-[#D8C3A5] pb-4 no-select">
          <span className="opacity-70">{modulesList[midx].icon}</span>
          <span>{t[`${mk}_title`]}</span>
        </h2>
        
        {/* Overview & Highlights */}
        <p className="text-lg font-medium text-slate-600 dark:text-slate-400">{t[`${mk}_overview`]}</p>
        <div className="bg-[#D8C3A5]/20 border-l-4 border-[#D8C3A5] p-3 rounded-r text-sm font-bold text-[#004030] dark:text-[#D8C3A5]">
          {t[`${mk}_highlights`]}
        </div>

        {/* Deep Dive */}
        <div className="space-y-4 mt-6">
          <p>{t[`${mk}_p1`]}</p>
          <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-slate-700 dark:text-slate-300 shadow-inner">{t[`${mk}_p2`]}</p>
          <p>{t[`${mk}_p3`]}</p>
          <p>{t[`${mk}_p4`]}</p>
        </div>

        {/* Micro Case */}
        <div className="bg-[#004030] text-[#D8C3A5] p-5 rounded-xl shadow-md my-8">
          <h4 className="font-bold font-serif text-base mb-2">{t[`${mk}_case_title`]}</h4>
          <p className="text-sm opacity-90 leading-relaxed">{t[`${mk}_case_desc`]}</p>
        </div>

        {/* SVG Diagram (placed here per spec) */}
        <SVGDemo mod={midx} title={t[`${mk}_svg_title`]} />

        {/* Wrap Up */}
        <div className="bg-slate-100 dark:bg-slate-800 p-4 rounded-xl text-sm italic border-l-4 border-slate-400">
          {t[`${mk}_wrapup`]}
        </div>

        {/* Components */}
        <FlipCardBox cards={t[`${mk}_terms`]} t={t} moduleId={midx} onCardViewed={handleCardViewed} />
        <QuizBox questions={t[`${mk}_q`]} t={t} moduleId={midx} onQuizSubmit={handleQuizSubmit} />
        
        {renderNavBottom()}
      </div>
    );
  };

  const renderAnalytics = () => {
    const totalTime = analytics.time.reduce((a,b)=>a+b,0);
    const totalClicks = analytics.clicks.reduce((a,b)=>a+b,0);
    const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
    const totalQuiz = analytics.quizTotal.reduce((a,b)=>a+b,0);
    const overallAcc = totalQuiz>0 ? Math.round((totalCorrect/totalQuiz)*100) : 0;
    
    // Form Validation logic
    const canExport = studentInfo.group && studentInfo.dept.length > 0 && studentInfo.id.length > 4 && studentInfo.nameEn && studentInfo.nameZh;
    
    return(
      <div className="space-y-8 animate-fade-in no-select">
        <h2 className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3 border-b-2 border-[#D8C3A5] pb-4">
          <span className="opacity-70">{modulesList[8].icon}</span><span>{t.analytics_title}</span>
        </h2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <p className="text-xs text-emerald-600 dark:text-emerald-400">{t.analytics_wp_saved}</p>
        
        {/* Top KPIs */}
        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
          {[[totalTime+t.analytics_sec, t.analytics_total_time], [totalClicks+t.analytics_times, t.analytics_total_clicks], [overallAcc+'%', t.analytics_overall_acc]].map(([val, label], i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
              <div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{val}</div>
              <div className="text-xs text-slate-500 mt-1">{label}</div>
            </div>
          ))}
        </div>

        {/* Detailed Table */}
        <div className="overflow-x-auto bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
          <table className="w-full text-sm text-left">
            <thead className="bg-[#004030]/5 dark:bg-[#D8C3A5]/10 text-xs uppercase font-bold text-slate-600 dark:text-slate-300">
              <tr>
                <th className="px-4 py-3">{t.analytics_module}</th>
                <th className="px-4 py-3 text-center">{t.analytics_time}</th>
                <th className="px-4 py-3 text-center">{t.analytics_card_usage}</th>
                <th className="px-4 py-3 text-center">{t.analytics_acc}</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
              {modulesList.map((m, i) => {
                if(i===6 || i===7 || i===8) return null;
                const isContent = i>=1 && i<=N;
                const cardTotal = isContent ? (t[`${mKeys[i-1]}_terms`]?.length || 0) : 0;
                const cardRead = analytics.cardsViewedSets[i]?.length || 0;
                const cardRateStr = cardTotal > 0 ? Math.round((cardRead/cardTotal)*100)+'%' : '-';
                const accStr = analytics.quizTotal[i]>0 ? Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%' : '-';
                return (
                  <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                    <td className="px-4 py-3 font-medium">{m.title}</td>
                    <td className="px-4 py-3 text-center">{analytics.time[i]}{t.analytics_sec}</td>
                    <td className="px-4 py-3 text-center font-mono">{cardRateStr}</td>
                    <td className="px-4 py-3 text-center font-mono font-bold text-[#004030] dark:text-[#D8C3A5]">{accStr}</td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        </div>

        {/* Export Form */}
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label className="text-xs font-bold block mb-1">{t.analytics_group} *</label><select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"><option value="">{t.analytics_group_select}</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
            <div><label className="text-xs font-bold block mb-1">{t.analytics_dept} *</label><input maxLength="20" placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:DOMPurify.sanitize(e.target.value)}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"/></div>
            <div><label className="text-xs font-bold block mb-1">{t.analytics_id} *</label><input maxLength="20" placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:DOMPurify.sanitize(e.target.value)}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"/></div>
            <div><label className="text-xs font-bold block mb-1">{t.analytics_name_en} *</label><input maxLength="50" placeholder={t.analytics_name_en_ph} value={studentInfo.nameEn} onChange={e=>setStudentInfo(s=>({...s,nameEn:DOMPurify.sanitize(e.target.value)}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"/></div>
            <div><label className="text-xs font-bold block mb-1">{t.analytics_name_zh} *</label><input maxLength="20" placeholder={t.analytics_name_zh_ph} value={studentInfo.nameZh} onChange={e=>setStudentInfo(s=>({...s,nameZh:DOMPurify.sanitize(e.target.value)}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"/></div>
          </div>
          <div className="flex items-center gap-4 mt-6">
            <button onClick={handleExportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-opacity text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
            <button onClick={handleClearHistory} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-lg">{t.analytics_wp_clear}</button>
          </div>
        </div>
      </div>
    );
  };

  const renderContent = () => {
    if (module === 0) {
      return (
        <div className="space-y-8 animate-fade-in core-content">
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white no-select">
            <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_overview}</p>
          </div>
          <div className="bg-[#D8C3A5]/20 border-l-4 border-[#D8C3A5] p-3 rounded-r text-sm font-bold text-[#004030] dark:text-[#D8C3A5]">
            {t.m0_highlights}
          </div>
          <div className="space-y-4">
            <p>{t.m0_p1}</p>
            <p>{t.m0_p2}</p>
            <p>{t.m0_p3}</p>
          </div>
          
          <SVGDemo mod={0} title={t.m0_svg_title} />

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 no-select">
            {t.m0_stats.map((s, i) => (
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500">{s.label}</div>
              </div>
            ))}
          </div>

          <div className="bg-slate-100 dark:bg-slate-800 p-4 rounded-xl text-sm italic border-l-4 border-slate-400">
            {t.m0_wrapup}
          </div>

          <div className="no-select">
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m, i) => (
                <button key={i} onClick={() => setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500 truncate">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors shrink-0"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end no-select">
            <button onClick={() => setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white transition-colors rounded-lg shadow-md">{t.m0_start}</button>
          </div>
        </div>
      );
    }
    if (module >= 1 && module <= N) return renderModule(mKeys[module-1], module);
    if (module === 6) return (
      <div className="space-y-8 animate-fade-in core-content">
        <h2 className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3 border-b-2 border-[#D8C3A5] pb-4">
          <span className="opacity-70">{modulesList[6].icon}</span><span>{t.m6_title}</span>
        </h2>
        <p>{t.m6_desc}</p>
        <div className="grid md:grid-cols-2 gap-4">
          <a href="https://www.strategyzer.com/library/the-business-model-canvas" target="_blank" className="block p-4 border rounded-xl hover:border-[#004030] dark:hover:border-[#D8C3A5] transition-colors bg-white dark:bg-slate-800">
            <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5]">Business Model Canvas</h4>
            <p className="text-xs mt-2 text-slate-500">Official Strategyzer tools and resources.</p>
          </a>
          <a href="https://www.youtube.com/watch?v=z2oS3zk8VA4" target="_blank" className="block p-4 border rounded-xl hover:border-[#004030] dark:hover:border-[#D8C3A5] transition-colors bg-white dark:bg-slate-800">
            <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5]">Porter: Creating Shared Value</h4>
            <p className="text-xs mt-2 text-slate-500">Michael Porter explains CSV at Harvard.</p>
          </a>
        </div>
        {renderNavBottom()}
      </div>
    );
    if (module === 7) return (
      <div className="space-y-8 animate-fade-in core-content">
        <h2 className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3 border-b-2 border-[#D8C3A5] pb-4">
          <span className="opacity-70">{modulesList[7].icon}</span><span>{t.mlab_title}</span>
        </h2>
        <p>{t.mlab_desc}</p>
        <BMCGame lang={lang} />
        {renderNavBottom()}
      </div>
    );
    return renderAnalytics();
  };

  return (
    <div className="min-h-screen flex flex-col pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]">
      {alertMsg && <AlertModal message={alertMsg} onClose={() => setAlertMsg('')} />}
      
      {/* Header (h-16) */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30 no-select">
        <div className="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <div className="relative" ref={menuRef}>
              <button className="p-2 hover:bg-white/10 rounded-lg transition-colors" onClick={() => setMenuOpen(!menuOpen)}>
                {menuOpen ? <IconX size={20}/> : <IconMenu size={20}/>}
              </button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-2 w-64 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-hidden text-slate-800 dark:text-slate-200">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-500">{t.nav_modules}</p>
                  </div>
                  {modulesList.map(m => (
                    <button key={m.id} onClick={() => { setModule(m.id); setMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5]':'hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="font-serif font-black text-xl tracking-widest text-[#D8C3A5]">VPC</div>
              <div className="hidden sm:block text-left ml-2">
                <h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1>
              </div>
            </button>
          </div>
          <div className="flex items-center space-x-1">
            <div className="flex items-center mr-2">
              {ttsState !== 'playing' ? (
                <button onClick={() => handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center text-xs"><IconPlay size={16}/><span className="hidden md:inline ml-1">{t.audio_read}</span></button>
              ) : (
                <button onClick={() => handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={16}/></button>
              )}
              {ttsState !== 'idle' && <button onClick={() => handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={16}/></button>}
            </div>
            <button onClick={() => setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button>
            <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark ? <IconSun size={18}/> : <IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto w-full px-4 flex-1 flex flex-col md:flex-row gap-6 py-8">
        {/* Sidebar Menu */}
        <aside className="hidden md:block w-64 shrink-0 no-select">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700">
              <p className="text-xs font-bold uppercase tracking-wider text-slate-500">{t.nav_modules}</p>
            </div>
            <nav className="p-2 space-y-1">
              {modulesList.map(m => (
                <button key={m.id} onClick={() => { setModule(m.id); setMenuOpen(false); }} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5]':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                  <span className={`mr-3 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span>
                  <span className="truncate">{m.title}</span>
                  {module===m.id && <IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
                </button>
              ))}
            </nav>
          </div>
        </aside>
        
        {/* Main Content */}
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClickAnalytics}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 sm:p-8">
            {renderContent()}
          </div>
        </main>
      </div>

      {/* Footer (h-8) */}
      <footer className="h-8 bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5] no-select">
        <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            {/* 嚴格規定：Architect 保持英文 */}
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">
              Architect:&nbsp;<a href={dict.zh.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a>
            </span>
            <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer border-l border-slate-600 pl-3">Top ↑</button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
